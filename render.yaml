services:
  - type: web
    name: server-parts-price-comparator
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --chdir backend app_v2:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEMO_MODE
        value: "false"
      # 无需配置任何 API Key！使用完全免费的 SearXNG 公共实例
